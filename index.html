<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>
RB SYSTEM
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">

<h1>

<span class="green">
RB
</span>

SYSTEM

</h1>

<p>

TRADING DASHBOARD

</p>

</div>



<nav>

<button class="menu active">

📊 Trading Setup

</button>

<button class="menu">

📁 Reports Box

</button>

<button class="menu">

🖼 Media Box

</button>

<button class="menu">

📝 Notes Box

</button>

<button class="menu">

🕒 History Box

</button>

<button class="menu">

⚙ Settings Box

</button>

</nav>

</aside>



<!-- MAIN -->

<main class="main">



<!-- PAGE 1 -->

<section
id="trading"
class="page active-page">

<div class="setup-card">

<div class="top">

<h2>

📊 Trading Setup

</h2>

<button id="reset">

Reset

</button>

</div>


<div class="grid">

<input
placeholder="Setup Name">

<select>

<option>
OTC
</option>

<option>
REAL
</option>

</select>


<input
placeholder="Pair">

<input
placeholder="Win Rate">


</div>


<textarea
placeholder="Write Strategy">
</textarea>


<div class="grid">

<input
placeholder="Video Link">

<input
placeholder="Photo Name">

</div>


<input
type="file">


<button id="save">

💾 SAVE

</button>


<div class="saved">

<div id="list">

</div>

</div>

</div>

</section>





<!-- PAGE 2 -->

<section
id="reports"
class="page">

<h2>

📁 Reports Box

</h2>

<div class="page-box">

<input
placeholder="Search reports...">

<br><br>

<div id="reportList">

No Reports

</div>

</div>

</section>





<!-- PAGE 3 -->

<section
id="media"
class="page">

<h2>

🖼 Media Box

</h2>

<div class="page-box">

Photo Gallery

<br><br>

Video Gallery

</div>

</section>





<!-- PAGE 4 -->

<section
id="notes"
class="page">

<h2>

📝 Notes Box

</h2>

<div class="page-box">

<input
placeholder="Note">

<br><br>

<textarea>

</textarea>

<br><br>

<button
onclick="saveNote()">

Save Note

</button>

</div>

</section>





<!-- PAGE 5 -->

<section
id="history"
class="page">

<h2>

🕒 History Box

</h2>

<div class="page-box">

History Here

</div>

</section>





<!-- PAGE 6 -->

<section
id="settings"
class="page">

<h2>

⚙ Settings Box

</h2>

<div class="page-box">

<button
onclick="clearAll()">

Clear All Data

</button>

</div>

</section>


</main>

</div>


<script
src="script.js">
</script>

</body>

</html>
