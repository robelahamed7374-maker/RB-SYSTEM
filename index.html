<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
RB SYSTEM
</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">

<h1>
<span class="green">
RB
</span>

SYSTEM
</h1>

<p>
TRADING DASHBOARD
</p>

</div>

<nav>

<button class="menu active">
📊 Trading Setup
</button>

<button class="menu">
📁 Reports Box
</button>

<button class="menu">
🖼 Media Box
</button>

<button class="menu">
📝 Notes Box
</button>

<button class="menu">
🕒 History Box
</button>

<button class="menu">
⚙ Settings Box
</button>

</nav>

<div class="copyright">

© 2025 RB System

</div>

</aside>


<!-- MAIN -->

<main class="main">

<section class="setup-card">

<div class="top">

<h2>

📊 Trading Setup

</h2>

<button id="reset">

Reset

</button>

</div>


<div class="grid">

<input
placeholder="Ex: OTC Breakout">

<select>

<option>
OTC
</option>

<option>
Real Market
</option>

</select>

<input
placeholder="Ex: EUR/USD">

<input
placeholder="Ex: 80%">

</div>


<textarea
placeholder="এখানে তোমার সেটআপ এবং স্ট্রাটেজি লিখো...">
</textarea>


<div class="grid">

<input
placeholder="Video Link">

<input
placeholder="Photo Description">

</div>


<input
type="file">


<button id="save">

💾 SAVE

</button>

</section>



<section class="saved">

<div class="saved-head">

<h3>

Saved Trading Setups

</h3>

<input
placeholder="Search setups...">

</div>


<div id="list">

</div>

</section>

</main>

</div>


<script src="script.js"></script>

</body>

</html>
