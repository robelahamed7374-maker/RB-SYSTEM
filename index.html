<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>RB SYSTEM</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h1>
<span>RB</span>
SYSTEM
</h1>

<p>TRADING DASHBOARD</p>

<button
class="menu active"
data-page="trade">

📊 Trading Setup

</button>

<button
class="menu"
data-page="report">

📁 Reports Box

</button>

<button
class="menu"
data-page="media">

🖼 Media Box

</button>

<button
class="menu"
data-page="notes">

📝 Notes Box

</button>

<button
class="menu"
data-page="history">

🕒 History

</button>

<button
class="menu"
data-page="settings">

⚙ Settings

</button>

</div>

<!-- CONTENT -->

<div class="content">

<!-- TRADE -->

<div
id="trade"
class="page active">

<div class="card">

<h2>
📊 Trading Setup
</h2>

<input
id="name"
placeholder="Setup Name">

<select id="market">

<option>
OTC
</option>

<option>
Real Market
</option>

</select>

<input
id="pair"
placeholder="Pair">

<input
id="win"
placeholder="Win Rate">

<textarea
id="note"
placeholder="Strategy">
</textarea>

<input
id="video"
placeholder="Video Link">

<input
id="photo"
type="file">

<button
id="save">

💾 SAVE

</button>

</div>

</div>

<!-- REPORT -->

<div
id="report"
class="page">

<div class="card">

<h2>
📁 Reports Box
</h2>

<input
placeholder="Search">

<div
id="reportList">

No Reports

</div>

</div>

</div>

<!-- MEDIA -->

<div
id="media"
class="page">

<div class="card">

<h2>
🖼 Media Box
</h2>

<div
id="mediaList">

No Media

</div>

</div>

</div>

<!-- NOTES -->

<div
id="notes"
class="page">

<div class="card">

<h2>
📝 Notes Box
</h2>

<textarea>

</textarea>

</div>

</div>

<!-- HISTORY -->

<div
id="history"
class="page">

<div class="card">

<h2>
🕒 History
</h2>

<div>

No History

</div>

</div>

</div>

<!-- SETTINGS -->

<div
id="settings"
class="page">

<div class="card">

<h2>
⚙ Settings
</h2>

<button>

Clear Data

</button>

</div>

</div>

</div>

</div>

<script
src="script.js">
</script>

</body>

</html>
