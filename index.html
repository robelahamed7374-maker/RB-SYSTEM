<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>
RB SYSTEM
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar">

<div class="logo">

<h1>

<span>
RB
</span>

SYSTEM

</h1>

<p>

TRADING DASHBOARD

</p>

</div>


<button class="menu active"
data-page="trading">

📊 Trading Setup

</button>

<button class="menu"
data-page="reports">

📁 Reports Box

</button>

<button class="menu"
data-page="media">

🖼 Media Box

</button>

<button class="menu"
data-page="notes">

📝 Notes Box

</button>

<button class="menu"
data-page="history">

🕒 History Box

</button>

<button class="menu"
data-page="settings">

⚙ Settings Box

</button>

</aside>



<!-- MAIN -->

<main class="main">



<!-- TRADING -->

<section
id="trading"
class="page active-page">

<div class="box">

<h2>

📊 Trading Setup

</h2>

<input
id="name"
placeholder="Setup Name">

<select
id="market">

<option>
OTC
</option>

<option>
Real Market
</option>

</select>

<input
id="pair"
placeholder="Pair">

<input
id="win"
placeholder="Win Rate">

<textarea
id="note"
placeholder="Write Strategy">
</textarea>

<input
id="video"
placeholder="Video Link">

<input
id="photo"
placeholder="Photo Description">

<input
type="file">

<button
id="save">

💾 SAVE

</button>

</div>

</section>



<!-- REPORTS -->

<section
id="reports"
class="page">

<div class="box">

<h2>

📁 Reports Box

</h2>

<input
placeholder="Search..."
id="search">

<div
id="reportList">

</div>

</div>

</section>



<!-- MEDIA -->

<section
id="media"
class="page">

<div class="box">

<h2>

🖼 Media Box

</h2>

<div
id="mediaList">

No Media

</div>

</div>

</section>



<!-- NOTES -->

<section
id="notes"
class="page">

<div class="box">

<h2>

📝 Notes Box

</h2>

<textarea
id="noteText">
</textarea>

<button>

Save Note

</button>

</div>

</section>



<!-- HISTORY -->

<section
id="history"
class="page">

<div class="box">

<h2>

🕒 History Box

</h2>

<div>

No History

</div>

</div>

</section>



<!-- SETTINGS -->

<section
id="settings"
class="page">

<div class="box">

<h2>

⚙ Settings

</h2>

<button>

Clear Data

</button>

</div>

</section>


</main>

</div>

<script
src="script.js">
</script>

</body>

</html>
