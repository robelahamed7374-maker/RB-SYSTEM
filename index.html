<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RB SYSTEM</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="sidebar">

<h1>
<span>RB</span>
SYSTEM
</h1>

<p>TRADING DASHBOARD</p>

<button class="menu active">
📊 Trading Setup
</button>

<button class="menu">
📁 Reports Box
</button>

<button class="menu">
🖼 Media Box
</button>

<button class="menu">
📝 Notes Box
</button>

<button class="menu">
🕒 History Box
</button>

<button class="menu">
⚙ Settings
</button>

</div>


<div class="content">

<div class="box">

<h2>📊 Trading Setup</h2>

<input id="name" placeholder="Setup Name">

<select id="market">

<option>OTC</option>

<option>Real Market</option>

</select>

<input id="pair" placeholder="Pair">

<input id="win" placeholder="Win Rate">

<textarea
id="note"
placeholder="Strategy">
</textarea>

<input
id="video"
placeholder="Video Link">

<input
type="file"
id="photo">

<button id="save">

💾 SAVE

</button>

</div>



<div class="box">

<h2>📁 Reports Box</h2>

<input
id="search"
placeholder="Search">

<div
id="reportList">
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
