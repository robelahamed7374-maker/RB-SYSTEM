<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RB SYSTEM</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<div class="sidebar">

<h1>

<span>RB</span>

SYSTEM

</h1>

<p>
TRADING DASHBOARD
</p>


<button class="tab active"
data-page="setup">

📊 Trading Setup

</button>


<button class="tab"
data-page="reports">

📁 Reports Box

</button>


<button class="tab"
data-page="media">

🖼 Media Box

</button>


<button class="tab"
data-page="notes">

📝 Notes Box

</button>


<button class="tab"
data-page="history">

🕒 History Box

</button>


<button class="tab"
data-page="settings">

⚙ Settings

</button>

</div>



<div class="content">



<!-- SETUP -->

<section
id="setup"
class="page active">

<div class="box">

<h2>

📊 Trading Setup

</h2>

<input
id="name"
placeholder="Setup Name">

<select id="market">

<option>
OTC
</option>

<option>
Real Market
</option>

</select>

<input
id="pair"
placeholder="Pair">

<input
id="win"
placeholder="Win Rate">

<textarea
id="note"
placeholder="Strategy">
</textarea>

<input
id="video"
placeholder="Video Link">

<input
type="file"
id="photo">

<button
id="save">

💾 SAVE

</button>

</div>

</section>



<!-- REPORT -->

<section
id="reports"
class="page">

<div class="box">

<h2>

📁 Reports Box

</h2>

<input
id="search"
placeholder="Search">

<div
id="reportList">
</div>

</div>

</section>



<!-- MEDIA -->

<section
id="media"
class="page">

<div class="box">

<h2>

🖼 Media Box

</h2>

<div
id="mediaList">

No Media

</div>

</div>

</section>



<!-- NOTES -->

<section
id="notes"
class="page">

<div class="box">

<h2>

📝 Notes Box

</h2>

<textarea
id="notesText">

</textarea>

<button>

Save Note

</button>

</div>

</section>



<!-- HISTORY -->

<section
id="history"
class="page">

<div class="box">

<h2>

🕒 History

</h2>

<div
id="historyList">

No History

</div>

</div>

</section>



<!-- SETTINGS -->

<section
id="settings"
class="page">

<div class="box">

<h2>

⚙ Settings

</h2>

<button
onclick="

localStorage.clear();

location.reload();

">

Clear Data

</button>

</div>

</section>



</div>

</div>


<script src="script.js"></script>

</body>

</html>
